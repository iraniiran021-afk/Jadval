<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=5, user-scalable=yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0d0d1a">
<title>جدول تناوبی فارسی</title>
<link rel="manifest" href="manifest.json">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;700&family=Rubik:wght@400;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;background:#0d0d1a;color:#fff;font-family:Tahoma,'Segoe UI',sans-serif;overscroll-behavior:none;}
#app{display:flex;flex-direction:column;height:100dvh;}
/* Header */
#header{padding:10px 12px 8px;background:#13131f;border-bottom:1px solid #1e1e30;flex-shrink:0;}
.h-top{display:flex;align-items:center;justify-content:space-between;}
.h-title{font-size:16px;font-weight:700;}
.h-title span{font-size:12px;color:#555;font-weight:400;margin-right:5px;}
.h-btns{display:flex;gap:5px;}
.hbtn{background:#1a1a2e;border:1px solid #2a2a3e;color:#aaa;border-radius:8px;padding:5px 9px;font-size:12px;cursor:pointer;font-family:inherit;white-space:nowrap;}
.hbtn.active{border-color:#4dabf7;color:#4dabf7;}
.score-bar{margin-top:7px;display:flex;align-items:center;gap:8px;}
.score-text{font-size:11px;color:#666;}
.score-track{flex:1;height:3px;background:#1a1a2e;border-radius:2px;overflow:hidden;}
.score-fill{height:100%;background:linear-gradient(90deg,#69db7c,#38d9a9);border-radius:2px;transition:width .4s;}
/* Tabs */
#tabs{display:flex;background:#0d0d1a;border-bottom:1px solid #1e1e30;flex-shrink:0;}
.tab{flex:1;padding:9px;font-size:12px;text-align:center;cursor:pointer;color:#555;border-bottom:2px solid transparent;font-family:inherit;background:none;border-top:none;border-left:none;border-right:none;}
.tab.active{color:#4dabf7;border-bottom-color:#4dabf7;}
/* Filter */
#filter-bar{padding:6px 10px;display:flex;gap:6px;overflow-x:auto;flex-shrink:0;background:#0d0d1a;scrollbar-width:none;}
#filter-bar::-webkit-scrollbar{display:none;}
.chip{display:flex;align-items:center;gap:5px;border:1px solid #2a2a3e;border-radius:20px;padding:3px 9px;font-size:10px;cursor:pointer;white-space:nowrap;background:#1a1a2e;color:#666;font-family:inherit;flex-shrink:0;}
.chip.on{color:var(--c);border-color:var(--c);background:color-mix(in srgb,var(--c) 15%,transparent);}
.dot{width:6px;height:6px;border-radius:50%;background:var(--c);flex-shrink:0;}
/* Table */
#table-wrap{flex:1;overflow:auto;padding:8px;direction:ltr;display:flex;}
#table{direction:ltr;}
.trow{display:flex;gap:2px;margin-bottom:2px;}
.cell-gap{flex-shrink:0;}
.el{width:34px;height:34px;border:1px solid;border-radius:5px;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;position:relative;transition:transform .15s,box-shadow .15s,opacity .15s;flex-shrink:0;user-select:none;-webkit-tap-highlight-color:transparent;}
.el:active{transform:scale(0.93);}
.el.sel{transform:scale(1.15);z-index:10;}
.el.dim{opacity:.12;}
.el .z{position:absolute;top:2px;left:3px;font-size:6px;color:#555;line-height:1;}
.el .sym{font-size:11px;font-weight:700;line-height:1;}
.el .nm{font-size:5.5px;color:#999;margin-top:1px;text-align:center;line-height:1.1;padding:0 1px;max-width:32px;overflow:hidden;}
.el .q{font-size:13px;color:#2a2a3e;}
.section-gap{height:10px;}
.section-label{font-size:9px;color:#333;padding:2px 0 2px 4px;}
/* Panel */
#panel{flex-shrink:0;background:#13131f;border-top:2px solid #333;padding:12px 12px 22px;display:none;}
.panel-inner{display:flex;align-items:center;gap:12px;}
.big-cell{width:52px;height:52px;border-radius:12px;border:2px solid;display:flex;flex-direction:column;align-items:center;justify-content:center;flex-shrink:0;}
.big-sym{font-size:20px;font-weight:700;line-height:1;}
.big-z{font-size:9px;color:#888;}
.big-q{font-size:24px;color:#2a2a3e;}
.panel-info{flex:1;min-width:0;}
.cat-label{font-size:11px;margin-bottom:3px;}
.el-name{font-size:16px;font-weight:700;}
.input-row{display:flex;gap:6px;margin-top:4px;}
.el-input{flex:1;min-width:0;background:#1a1a2e;border:1.5px solid #2a2a3e;border-radius:8px;padding:7px 10px;color:#fff;font-size:13px;font-family:inherit;text-align:right;direction:rtl;outline:none;}
.el-input.ok{border-color:#69db7c;}
.el-input.err{border-color:#ff6b6b;}
.btn-check{background:#4dabf7;border:none;border-radius:8px;padding:7px 12px;color:#000;font-weight:700;font-size:13px;cursor:pointer;font-family:inherit;white-space:nowrap;}
.btn-reveal{background:#1a1a2e;border:1px solid #333;border-radius:8px;padding:7px 10px;color:#888;font-size:12px;cursor:pointer;font-family:inherit;white-space:nowrap;}
.fb-ok{color:#69db7c;font-size:12px;margin-top:4px;}
.fb-err{color:#ff6b6b;font-size:12px;margin-top:4px;}
.close-btn{background:#1a1a2e;border:1px solid #2a2a3e;border-radius:8px;padding:6px 9px;color:#666;font-size:16px;cursor:pointer;flex-shrink:0;}

/* ── QUIZ ── */
#quiz-wrap{flex:1;overflow-y:auto;padding:14px;display:none;flex-direction:column;gap:12px;}
#quiz-wrap.active{display:flex;}
#table-section{display:flex;flex-direction:column;flex:1;}
#table-section.hidden{display:none;}
.quiz-header{background:#13131f;border-radius:12px;padding:12px 14px;display:flex;align-items:center;justify-content:space-between;}
.quiz-stat{font-size:12px;color:#888;}
.quiz-stat b{color:#fff;}
.quiz-mode-bar{display:flex;gap:8px;flex-wrap:wrap;}
.qmode{background:#1a1a2e;border:1px solid #2a2a3e;color:#888;border-radius:20px;padding:5px 12px;font-size:11px;cursor:pointer;font-family:inherit;transition:all .15s;}
.qmode.on{border-color:#4dabf7;color:#4dabf7;background:color-mix(in srgb,#4dabf7 12%,transparent);}
.quiz-card{background:#13131f;border-radius:14px;padding:16px;border:1px solid #1e1e30;}
.quiz-question{font-size:14px;font-weight:700;margin-bottom:14px;line-height:1.6;text-align:center;}
.quiz-question .blank{display:inline-block;min-width:60px;border-bottom:2px solid #4dabf7;color:#4dabf7;text-align:center;padding:0 4px;}
/* Multiple choice */
.choices{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.choice{background:#1a1a2e;border:1.5px solid #2a2a3e;border-radius:10px;padding:10px;text-align:center;cursor:pointer;font-size:13px;font-family:inherit;color:#ccc;transition:all .15s;}
.choice:active{transform:scale(.97);}
.choice.correct{border-color:#69db7c;background:color-mix(in srgb,#69db7c 15%,transparent);color:#69db7c;}
.choice.wrong{border-color:#ff6b6b;background:color-mix(in srgb,#ff6b6b 15%,transparent);color:#ff6b6b;}
.choice.disabled{pointer-events:none;}
/* True/False */
.tf-row{display:flex;gap:10px;}
.tf-btn{flex:1;padding:12px;border-radius:10px;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit;border:1.5px solid;transition:all .15s;}
.tf-true{background:color-mix(in srgb,#69db7c 12%,transparent);border-color:#69db7c44;color:#69db7c;}
.tf-false{background:color-mix(in srgb,#ff6b6b 12%,transparent);border-color:#ff6b6b44;color:#ff6b6b;}
.tf-btn.correct{filter:brightness(1.4);}
.tf-btn.wrong{opacity:.4;}
.tf-btn.disabled{pointer-events:none;}
/* Fill blank */
.fill-row{display:flex;gap:8px;margin-top:4px;}
.fill-input{flex:1;background:#1a1a2e;border:1.5px solid #2a2a3e;border-radius:8px;padding:10px;color:#fff;font-size:14px;font-family:inherit;text-align:center;outline:none;}
.fill-input.ok{border-color:#69db7c;}
.fill-input.err{border-color:#ff6b6b;}
.fill-btn{background:#4dabf7;border:none;border-radius:8px;padding:10px 16px;color:#000;font-weight:700;font-size:13px;cursor:pointer;font-family:inherit;}
/* Result */
.quiz-result{text-align:center;margin-top:6px;padding:10px;border-radius:10px;font-size:13px;}
.quiz-result.ok{background:color-mix(in srgb,#69db7c 12%,transparent);color:#69db7c;}
.quiz-result.err{background:color-mix(in srgb,#ff6b6b 12%,transparent);color:#ff6b6b;}
.quiz-next{width:100%;background:#4dabf7;border:none;border-radius:10px;padding:11px;color:#000;font-weight:700;font-size:14px;cursor:pointer;font-family:inherit;margin-top:10px;}
/* End screen */
.quiz-end{text-align:center;padding:30px 20px;}
.quiz-end .score-big{font-size:48px;font-weight:700;margin:10px 0;}
.quiz-end .score-label{font-size:14px;color:#888;margin-bottom:20px;}
.quiz-restart{background:#4dabf7;border:none;border-radius:12px;padding:12px 30px;color:#000;font-weight:700;font-size:15px;cursor:pointer;font-family:inherit;}

/* Definitions */
#defs-wrap{flex:1;overflow-y:auto;padding:12px;flex-direction:column;gap:10px;}
.def-card{background:#13131f;border-radius:12px;border:1px solid #1e1e30;overflow:hidden;margin-bottom:10px;}
.def-header{display:flex;align-items:center;justify-content:space-between;padding:12px 14px;cursor:pointer;user-select:none;}
.def-icon{font-size:20px;margin-left:10px;}
.def-title{font-size:14px;font-weight:700;flex:1;}
.def-tag{font-size:10px;padding:3px 8px;border-radius:20px;border:1px solid;}
.def-arrow{font-size:12px;color:#555;transition:transform .2s;margin-right:6px;}
.def-arrow.open{transform:rotate(180deg);}
.def-body{padding:0 14px;max-height:0;overflow:hidden;transition:max-height .3s,padding .3s;}
.def-body.open{max-height:600px;padding:0 14px 14px;}
.def-text{font-size:13px;line-height:1.9;color:#ccc;}
.def-text b{color:#fff;}
.def-text .formula{display:inline-block;background:#1a1a2e;border:1px solid #2a2a3e;border-radius:6px;padding:2px 8px;font-family:monospace;font-size:13px;color:#4dabf7;margin:2px 0;}
.def-examples{margin-top:10px;display:flex;flex-wrap:wrap;gap:6px;}
.def-ex{background:#1a1a2e;border-radius:8px;padding:5px 10px;font-size:11px;color:#aaa;border:1px solid #2a2a3e;}
.def-ex b{color:#fff;}

#settings-modal{display:none;position:fixed;inset:0;z-index:100;background:rgba(0,0,0,.75);align-items:center;justify-content:center;}
#settings-modal.open{display:flex;}
#settings-box{background:#13131f;border:1px solid #2a2a3e;border-radius:16px;padding:20px;width:88%;max-width:340px;max-height:85vh;overflow-y:auto;}
.settings-title{font-size:15px;font-weight:700;margin-bottom:16px;color:#fff;text-align:right;}
.settings-row{margin-bottom:14px;}
.settings-label{font-size:12px;color:#aaa;margin-bottom:8px;display:block;text-align:right;}
.color-swatches{display:flex;gap:8px;flex-wrap:wrap;justify-content:flex-end;}
.swatch{width:28px;height:28px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:transform .15s;}
.font-btns{display:flex;gap:6px;flex-wrap:wrap;justify-content:flex-end;}
.font-btn{background:#1a1a2e;border:1px solid #2a2a3e;color:#aaa;border-radius:8px;padding:5px 10px;font-size:12px;cursor:pointer;transition:all .15s;}
.font-btn.active{border-color:#4dabf7;color:#4dabf7;}
.settings-close{width:100%;background:#1a1a2e;border:1px solid #2a2a3e;color:#aaa;border-radius:10px;padding:9px;font-size:13px;cursor:pointer;margin-top:6px;font-family:inherit;}
</style>
</head>
<body>
<div id="app">

      <div class="score-track"><div class="score-fill" id="score-fill" style="width:0%"></div></div>
    </div>
  </div>

  <div id="tabs">

        </div>
        <button class="close-btn" id="p-close">✕</button>
      </div>
    </div>
  </div>

  <!-- QUIZ SECTION -->
  <div id="quiz-wrap">
    <div class="quiz-header">
      <div class="quiz-stat">امتیاز: <b id="q-score">۰</b> | سوال: <b id="q-num">۰</b></div>

      <button class="qmode" data-mode="tf">صحیح/غلط</button>
      <button class="qmode" data-mode="fill">جا خالی</button>
      <button class="qmode" data-mode="mixed">ترکیبی</button>
    </div>
    <div id="quiz-card-area"></div>
  </div>
</div>

  <!-- DEFINITIONS SECTION -->
  <div id="defs-wrap" style="display:none;flex:1;overflow-y:auto;padding:12px;flex-direction:column;gap:10px;">

    <div style="background:#13131f;border-radius:12px;padding:12px 14px;margin-bottom:4px;">
      <input id="defs-search" type="text" placeholder="🔍 جستجو در تعاریف..." style="width:100%;background:#1a1a2e;border:1px solid #2a2a3e;border-radius:8px;padding:8px 12px;color:#fff;font-size:13px;font-family:inherit;outline:none;direction:rtl;">
    </div>

    <div id="defs-list"></div>
  </div>
<div id="settings-modal">
  <div id="settings-box">
    <div class="settings-title">⚙️ تنظیمات</div>
    <div class="settings-row">
      <span class="settings-label">رنگ پس‌زمینه</span>
      <div class="color-swatches" id="color-swatches">
        <div class="swatch" data-bg="#0d0d1a" data-hd="#13131f" style="background:#0d0d1a;border-color:#fff"></div>
        <div class="swatch" data-bg="#0a1628" data-hd="#0d1f3c" style="background:#0a1628"></div>
        <div class="swatch" data-bg="#1a0a28" data-hd="#240d3c" style="background:#1a0a28"></div>
        <div class="swatch" data-bg="#0a1f0a" data-hd="#0d2e0d" style="background:#0a1f0a"></div>
        <div class="swatch" data-bg="#1f0a0a" data-hd="#2e0d0d" style="background:#1f0a0a"></div>
        <div class="swatch" data-bg="#ffffff" data-hd="#f0f0f0" data-light="1" style="background:#ffffff"></div>
        <div class="swatch" data-bg="#f5f0e8" data-hd="#e8e0d0" data-light="1" style="background:#f5f0e8"></div>
      </div>
    </div>
    <div class="settings-row">
      <span class="settings-label">فونت</span>
      <div class="font-btns">
        <button class="font-btn active" data-font="Tahoma,sans-serif" style="font-family:Tahoma">پیش‌فرض</button>
        <button class="font-btn" data-font="'Vazirmatn',sans-serif" style="font-family:'Vazirmatn'">وزیرمتن</button>
        <button class="font-btn" data-font="'Rubik',sans-serif" style="font-family:'Rubik'">Rubik</button>
        <button class="font-btn" data-font="Georgia,serif" style="font-family:Georgia">Serif</button>
      </div>
    </div>
    <button class="settings-close" id="settings-close">بستن</button>
  </div>
</div>

const CELL=34;
function renderTable(){
  tableEl.innerHTML='';
  function makeRow(row,s,e,off){
    const d=document.createElement('div');d.className='trow';
    if(off){const g=document.createElement('div');g.className='cell-gap';g.style.width=(off*(CELL+2))+'px';d.appendChild(g);}
    for(let col=s;col<=e;col++){const key=`${row}-${col}`;const el=byPos[key];if(!el){const b=document.createElement('div');b.style.cssText=`width:${CELL}px;height:${CELL}px;flex-shrink:0`;d.appendChild(b);continue;}d.appendChild(makeCell(el));}
    return d;
  }
  for(let r=1;r<=7;r++)tableEl.appendChild(makeRow(r,1,18,0));
  const g=document.createElement('div');g.className='section-gap';tableEl.appendChild(g);

  tableEl.appendChild(makeRow(10,4,17,3));
}
function makeCell(el){
  const key=`${el.row}-${el.col}`;const color=CAT_COLORS[el.cat];
  const isRev=state.showAll||state.revealed[key];const isSel=state.selected===key;const isDim=state.filterCat&&state.filterCat!==el.cat;
  const div=document.createElement('div');
  div.className='el'+(isSel?' sel':'')+(isDim?' dim':'');
  div.style.cssText=`width:${CELL}px;height:${CELL}px;background:${isRev?color+'22':'#1a1a2e'};border-color:${isSel?color:color+'44'};box-shadow:${isSel?`0 0 0 2px ${color},0 2px 12px ${color}55`:'none'};`;
  const zEl=document.createElement('div');zEl.className='z';zEl.textContent=el.z;div.appendChild(zEl);
  if(isRev){const s=document.createElement('div');s.className='sym';s.style.color=color;s.textContent=el.sym;div.appendChild(s);const n=document.createElement('div');n.className='nm';n.textContent=el.name;div.appendChild(n);}
  else{const q=document.createElement('div');q.className='q';q.textContent='?';div.appendChild(q);}
  div.addEventListener('click',()=>{state.selected=state.selected===key?null:key;renderTable();updatePanel();});
  return div;
}
function updatePanel(){
  const key=state.selected;if(!key){panel.style.display='none';return;}
  const el=byPos[key];if(!el){panel.style.display='none';return;}
  panel.style.display='block';const color=CAT_COLORS[el.cat];panel.style.borderTopColor=color+'66';
  pBigcell.style.background=color+'22';pBigcell.style.borderColor=color+'66';
  const isRev=state.showAll||state.revealed[key];
  pBigcell.innerHTML=isRev?`<span class="big-sym" style="color:${color}">${el.sym}</span><span class="big-z">${el.z}</span>`:`<span class="big-q">?</span>`;
  pCat.style.color=color;pCat.textContent=`${CAT_FA[el.cat]} · عدد اتمی ${el.z}`;
  if(isRev){pNameArea.innerHTML=`<div class="el-name">${el.name} (${el.sym})</div>`;}
  else{
    const ic=state.checked[key];const bc=ic===true?'ok':ic===false?'err':'';
    pNameArea.innerHTML=`<div class="input-row"><input class="el-input ${bc}" id="el-inp" type="text" placeholder="نام یا نماد عنصر..." value="${state.input[key]||''}" autocomplete="off"><button class="btn-check" id="btn-check" style="background:${color}">تأیید</button><button class="btn-reveal" id="btn-reveal">نشان</button></div>${ic===true?'<div class="fb-ok">✅ آفرین!</div>':''}${ic===false?'<div class="fb-err">❌ اشتباه</div>':''}`;
    const inp=document.getElementById('el-inp');inp.focus();
    inp.addEventListener('input',e=>{state.input[key]=e.target.value;});
    inp.addEventListener('keydown',e=>{if(e.key==='Enter')doCheck(key,el);});
    document.getElementById('btn-check').addEventListener('click',()=>doCheck(key,el));
    document.getElementById('btn-reveal').addEventListener('click',()=>{state.revealed[key]=true;state.checked[key]=null;renderTable();updatePanel();});
  }
}
function doCheck(key,el){
  const val=(state.input[key]||'').trim().toLowerCase();
  const ok=val===el.sym.toLowerCase()||val===el.name||val===el.name.toLowerCase();
  state.checked[key]=ok;if(ok){state.revealed[key]=true;updateScore();}
  renderTable();updatePanel();
}

// ── QUIZ ENGINE ────────────────────────────────────────────────
const quizState={mode:'mc',score:0,correct:0,wrong:0,num:0,started:false,answered:false};
const qScoreEl=document.getElementById('q-score');
const qNumEl=document.getElementById('q-num');
const qCorrectEl=document.getElementById('q-correct');
const qWrongEl=document.getElementById('q-wrong');
const cardArea=document.getElementById('quiz-card-area');

document.querySelectorAll('.qmode').forEach(btn=>{
  btn.addEventListener('click',()=>{
    document.querySelectorAll('.qmode').forEach(b=>b.classList.remove('on'));
    btn.classList.add('on');quizState.mode=btn.dataset.mode;
    quizState.score=0;quizState.correct=0;quizState.wrong=0;quizState.num=0;
    updateQuizStats();startQuiz();
  });
});

function updateQuizStats(){
  qScoreEl.textContent=toFa(quizState.score);
  qNumEl.textContent=toFa(quizState.num);
  qCorrectEl.textContent=toFa(quizState.correct);
  qWrongEl.textContent=toFa(quizState.wrong);
}

function getMode(){
  if(quizState.mode==='mixed'){const m=['mc','tf','fill'];return m[Math.floor(Math.random()*m.length)];}
  return quizState.mode;
}

// Question templates
function makeQuestion(el){
  const type=Math.floor(Math.random()*4);
  if(type===0) return {q:`نماد عنصر «${el.name}» چیست؟`, a:el.sym, hint:el.sym};
  if(type===1) return {q:`نام عنصر با نماد «${el.sym}» چیست؟`, a:el.name, hint:el.name};
  if(type===2) return {q:`عدد اتمی «${el.name}» چقدر است؟`, a:String(el.z), hint:String(el.z)};
  return {q:`«${el.name}» در کدام دسته قرار دارد؟`, a:CAT_FA[el.cat], hint:CAT_FA[el.cat]};
}

function startQuiz(){
  quizState.started=true;
  const el=rand(ELEMENTS);
  const mode=getMode();
  quizState.num++;quizState.answered=false;
  updateQuizStats();
  if(mode==='mc') renderMC(el);
  else if(mode==='tf') renderTF(el);
  else renderFill(el);
}

// ── Multiple Choice ────────────────────────────────────────────
function renderMC(el){
  const q=makeQuestion(el);
  // Build 4 choices — pick answer type matching the question
  let pool;
  if(q.a===el.sym) pool=ELEMENTS.map(e=>e.sym);
  else if(q.a===el.name) pool=ELEMENTS.map(e=>e.name);
  else if(q.a===String(el.z)) pool=ELEMENTS.map(e=>String(e.z));
  else pool=[...new Set(ELEMENTS.map(e=>CAT_FA[e.cat]))];
  const wrong=shuffle(pool.filter(v=>v!==q.a)).slice(0,3);
  const choices=shuffle([q.a,...wrong]);
  cardArea.innerHTML=`
    <div class="quiz-card">
      <div class="quiz-question">${q.q}</div>
      <div class="choices" id="choices">
        ${choices.map(c=>`<button class="choice" data-val="${c}">${c}</button>`).join('')}
      </div>
      <div id="q-result"></div>
      <button class="quiz-next" id="q-next" style="display:none">سوال بعدی ←</button>
    </div>`;
  document.querySelectorAll('.choice').forEach(btn=>{
    btn.addEventListener('click',()=>{
      if(quizState.answered)return;quizState.answered=true;
      const ok=btn.dataset.val===q.a;
      btn.classList.add(ok?'correct':'wrong');
      document.querySelectorAll('.choice').forEach(b=>{b.classList.add('disabled');if(b.dataset.val===q.a)b.classList.add('correct');});
      if(ok){quizState.correct++;quizState.score+=10;}else{quizState.wrong++;}
      updateQuizStats();
      document.getElementById('q-result').innerHTML=`<div class="quiz-result ${ok?'ok':'err'}">${ok?'✅ آفرین! +۱۰ امتیاز':'❌ غلط — جواب: '+q.a}</div>`;
      document.getElementById('q-next').style.display='block';
    });
  });
  document.getElementById('q-next').addEventListener('click',startQuiz);
}

// ── True / False ───────────────────────────────────────────────
function renderTF(el){
  // Randomly show correct or wrong statement
  const isCorrect=Math.random()>.5;
  const fakeEl=rand(ELEMENTS.filter(e=>e.sym!==el.sym));
  let statement, correctAnswer;
  const type=Math.floor(Math.random()*3);
  if(type===0){statement=isCorrect?`نماد «${el.name}» برابر «${el.sym}» است.`:`نماد «${el.name}» برابر «${fakeEl.sym}» است.`;correctAnswer=isCorrect;}
  else if(type===1){statement=isCorrect?`عدد اتمی «${el.name}» برابر ${el.z} است.`:`عدد اتمی «${el.name}» برابر ${fakeEl.z} است.`;correctAnswer=isCorrect;}
  else{statement=isCorrect?`«${el.name}» یک ${CAT_FA[el.cat]} است.`:`«${el.name}» یک ${CAT_FA[fakeEl.cat]} است.`;correctAnswer=isCorrect;}
  cardArea.innerHTML=`
    <div class="quiz-card">
      <div class="quiz-question">این جمله درست است یا غلط؟<br><br>«${statement}»</div>
      <div class="tf-row">
        <button class="tf-btn tf-true" id="tf-t">✅ درست</button>
        <button class="tf-btn tf-false" id="tf-f">❌ غلط</button>
      </div>
      <div id="q-result"></div>
      <button class="quiz-next" id="q-next" style="display:none">سوال بعدی ←</button>
    </div>`;
  function handleTF(userSaysTrue){
    if(quizState.answered)return;quizState.answered=true;
    const ok=userSaysTrue===correctAnswer;
    if(ok){quizState.correct++;quizState.score+=10;}else quizState.wrong++;
    updateQuizStats();
    document.getElementById('tf-t').classList.add(correctAnswer?'correct':'wrong','disabled');
    document.getElementById('tf-f').classList.add(!correctAnswer?'correct':'wrong','disabled');
    document.getElementById('q-result').innerHTML=`<div class="quiz-result ${ok?'ok':'err'}">${ok?'✅ آفرین! +۱۰ امتیاز':'❌ غلط — جمله '+(correctAnswer?'درست':'غلط')+' بود'}</div>`;
    document.getElementById('q-next').style.display='block';
  }
  document.getElementById('tf-t').addEventListener('click',()=>handleTF(true));
  document.getElementById('tf-f').addEventListener('click',()=>handleTF(false));
  document.getElementById('q-next').addEventListener('click',startQuiz);
}

// ── Fill in the Blank ──────────────────────────────────────────
function renderFill(el){
  const type=Math.floor(Math.random()*3);
  let question,answer;
  if(type===0){question=`نماد عنصر «${el.name}» با عدد اتمی ${el.z} : <span class="blank">___</span>`;answer=el.sym.toLowerCase();}
  else if(type===1){question=`نام عنصر با نماد «${el.sym}» و عدد اتمی ${el.z} : <span class="blank">___</span>`;answer=el.name;}
  else{question=`عدد اتمی عنصر «${el.name}» (${el.sym}) : <span class="blank">___</span>`;answer=String(el.z);}
  cardArea.innerHTML=`
    <div class="quiz-card">
      <div class="quiz-question">${question}</div>
      <div class="fill-row">
        <input class="fill-input" id="fill-inp" type="text" placeholder="جواب را بنویس..." autocomplete="off" dir="auto">
        <button class="fill-btn" id="fill-ok">تأیید</button>
      </div>
      <div id="q-result"></div>
      <button class="quiz-next" id="q-next" style="display:none">سوال بعدی ←</button>
    </div>`;
  const inp=document.getElementById('fill-inp');inp.focus();
  function checkFill(){
    if(quizState.answered)return;quizState.answered=true;
    const val=inp.value.trim().toLowerCase();
    const ok=val===answer||val===el.sym.toLowerCase()||val===el.name.toLowerCase()||val===String(el.z);
    inp.classList.add(ok?'ok':'err');inp.disabled=true;
    if(ok){quizState.correct++;quizState.score+=10;}else quizState.wrong++;
    updateQuizStats();
    document.getElementById('q-result').innerHTML=`<div class="quiz-result ${ok?'ok':'err'}">${ok?'✅ آفرین! +۱۰ امتیاز':'❌ غلط — جواب: '+answer}</div>`;
    document.getElementById('q-next').style.display='block';
  }
  document.getElementById('fill-ok').addEventListener('click',checkFill);
  inp.addEventListener('keydown',e=>{if(e.key==='Enter')checkFill();});
  document.getElementById('q-next').addEventListener('click',startQuiz);
}

document.querySelectorAll('.font-btn').forEach(btn=>{

});

function renderDefs(filter=''){
  const list=document.getElementById('defs-list');
  list.innerHTML='';
  DEFS.filter(d=>!filter||d.title.includes(filter)||d.text.replace(/<[^>]+>/g,'').includes(filter)).forEach((d,i)=>{
    const card=document.createElement('div');card.className='def-card';
    card.innerHTML=`
      <div class="def-header" onclick="toggleDef(${i})">
        <span class="def-icon">${d.icon}</span>
        <span class="def-title">${d.title}</span>
        <span class="def-tag" style="color:${d.color};border-color:${d.color}44">شیمی</span>
        <span class="def-arrow" id="arr-${i}">▼</span>
      </div>
      <div class="def-body" id="body-${i}">
        <div class="def-text">${d.text}</div>
        ${d.examples?`<div class="def-examples">${d.examples.map(e=>`<div class="def-ex"><b>${e.l}</b>${e.v?': '+e.v:''}</div>`).join('')}</div>`:''}
      </div>`;
    list.appendChild(card);
  });
}
window.toggleDef=function(i){
  const body=document.getElementById(`body-${i}`);
  const arr=document.getElementById(`arr-${i}`);
  const open=body.classList.toggle('open');
  arr.classList.toggle('open',open);
};
document.getElementById('defs-search').addEventListener('input',e=>renderDefs(e.target.value.trim()));
renderDefs();
